<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=League+Spartan:wght@100..900&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h1>Password generator</h1>
            <div class="display-container">
                <!--password display bar-->
                <input  readonly placeholder="password" class="display" password-displayy>
                <!---copybutton-->
                <button  class="copybutton" copy-button>
                    <span class="sopyy" copy-message></span>
                    <img src="assets/copy.svg" alt="" height="23px" width="23px">
                </button>
            </div>
            <div class="input-container">
                <!--password length-->
                <div class="length-container">
                    <p>password length</p>
                    <p pass-length >0</p>
                </div>
                <!--password-range-->
                <input type="range" min="1" max="20" class="slider" step="1" range-slider >
                <!--checkboxes-->
                <div class="check">
                    <input type="checkbox" id="uppercase">
                    <label for="uppercase"> include Uppercase letters</label>
                </div>
                <div class="check">
                    <input type="checkbox" id="lowercase">
                    <label for="lowercase"> include LowerCase letters</label>
                </div>
                <div class="check">
                    <input type="checkbox" id="numbers">
                    <label for="numbers"> include Numbers </label>
                </div >
                <div class="check">
                    <input type="checkbox" id="Symbols">
                    <label for="Symbols"> include Symbols  </label>
                </div>
                <!--strength-bar-->
                <div class="strength-container">
                    <p>Strength</p>
                    <div class="indicator" strength-indicator></div>
                </div>
                <!--Generate-button-->
                <button class="generate-button" Generate-pass>Generate Password</button>
               

                

            </div>
        </div>
            


        
    </div>





    <script src="sript.js"></script>
</body>
</html>
